<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ads Admin Panel</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #01030a, #000);
    font-family: 'Segoe UI', sans-serif;
}

/* LOGIN UI */
.phone {
    width: 320px;
    height: 600px;
    border-radius: 40px;
    background: #020617;
    padding: 15px;
    margin: auto;
    margin-top: 50px;
    position: relative;
    overflow: hidden;
}

.screen {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#loginBtn {
    padding: 12px 30px;
    border: 2px solid #0ff;
    color: #0ff;
    background: transparent;
    border-radius: 30px;
    cursor: pointer;
}

.login-box {
    margin-top: 20px;
    width: 80%;
    opacity: 0;
    transform: translateY(50px);
    pointer-events: none;
    transition: 0.5s;
}

.login-box.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

.glow-input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
}

.submit-btn {
    width: 100%;
    padding: 10px;
    background: cyan;
    border: none;
}

/* PANEL */
#mainPanel {
    display: none;
    padding: 20px;
    color: white;
}

.ad {
    background: #1e293b;
    padding: 10px;
    margin: 10px 0;
}

/* GRAPH */
.graph {
  display:flex;
  gap:5px;
  height:120px;
}

.bar {
  flex:1;
  background:blue;
  color:white;
  font-size:10px;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="phone" id="loginUI">
<div class="screen">

<button id="loginBtn">⚡ Login</button>

<div class="login-box" id="loginBox">
<h2 style="color:#0ff;">Access System</h2>

<input id="username" placeholder="Username" class="glow-input">
<input id="password" type="password" placeholder="Password" class="glow-input">

<p id="errorMsg" style="color:red;display:none;">Wrong login</p>

<button class="submit-btn" onclick="login()">ENTER</button>
</div>

</div>
</div>

<!-- PANEL -->
<div id="mainPanel">

<h2>Ads Panel</h2>
<p id="roleInfo"></p>

<button onclick="logout()">Logout</button>

<input id="token" placeholder="GitHub Token">

<h3>Add Ad</h3>
<input id="id" placeholder="ID">
<input id="title" placeholder="Title">
<input id="image" placeholder="Image">
<input id="link" placeholder="Link">
<input id="category" placeholder="Category">

<button onclick="saveAd()">Save</button>

<div id="adsList"></div>

<button onclick="toggleStats()">Analytics</button>

<div id="statsBox" style="display:none;">
<div id="statsList"></div>

<h4>Views</h4>
<div id="viewsGraph" class="graph"></div>

<h4>Clicks</h4>
<div id="clicksGraph" class="graph"></div>
</div>

</div>

<script>

// USERS
const users=[
{user:"admin",pass:"7931",role:"admin"}
];

let currentUser;
let ads=[];
let stats={ads:{}};

// UI toggle
loginBtn.onclick=()=>loginBox.classList.toggle("active");

// LOGIN
function login(){
 let u=username.value.trim();
 let p=password.value.trim();

 let user=users.find(x=>x.user===u && x.pass===p);

 if(!user){
  errorMsg.style.display="block";
  return;
 }

 currentUser=user;

 loginUI.style.display="none";
 mainPanel.style.display="block";

 roleInfo.innerHTML="Logged in: "+user.user;

 loadData();
}

// LOAD DATA
async function loadData(){
 ads=await fetch("https://aveestb.github.io/my-ads-system/ads.json").then(r=>r.json());
 stats=await fetch("https://aveestb.github.io/my-ads-system/stats.json").then(r=>r.json());

 renderAds();
 renderStats();
}

// RENDER ADS
function renderAds(){
 let html="";

 ads.forEach(ad=>{

  if(!stats.ads[ad.id]){
   stats.ads[ad.id]={views:0,clicks:0,ctr:0};
  }

  // view count ONLY ONCE
  stats.ads[ad.id].views++;

  html+=`
  <div class="ad">
  <b>${ad.title}</b>

  <img src="${ad.image}" width="100%"
  onclick="trackClick(${ad.id},'${ad.link}')">

  </div>
  `;
 });

 adsList.innerHTML=html;
}

// CLICK TRACK
function trackClick(id,url){

 stats.ads[id].clicks++;

 let v=stats.ads[id].views;
 let c=stats.ads[id].clicks;

 stats.ads[id].ctr=((c/v)*100).toFixed(2);

 renderStats();

 window.open(url);
}

// STATS
function renderStats(){

 let list="";
 let vGraph="";
 let cGraph="";

 let maxV=1,maxC=1;

 for(let i in stats.ads){
  maxV=Math.max(maxV,stats.ads[i].views);
  maxC=Math.max(maxC,stats.ads[i].clicks);
 }

 for(let i in stats.ads){

  let s=stats.ads[i];

  list+=`Ad ${i}: ${s.views} / ${s.clicks} (${s.ctr}%)<br>`;

  vGraph+=`<div class="bar" style="height:${(s.views/maxV)*100}%">${i}</div>`;
  cGraph+=`<div class="bar" style="height:${(s.clicks/maxC)*100}%">${i}</div>`;
 }

 statsList.innerHTML=list;
 viewsGraph.innerHTML=vGraph;
 clicksGraph.innerHTML=cGraph;
}

// TOGGLE
function toggleStats(){
 statsBox.style.display=
 statsBox.style.display==="none"?"block":"none";
}

// SAVE AD
function saveAd(){
 let ad={
  id:Number(id.value||Date.now()),
  title:title.value,
  image:image.value,
  link:link.value,
  category:category.value
 };

 ads.push(ad);

 renderAds();
}

// LOGOUT
function logout(){
 location.reload();
}

</script>

</body>
</html>
