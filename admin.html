<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Ads Admin Panel</title>
<style>
body { font-family: Arial; max-width: 700px; margin: auto; }
.ad { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
h2 { text-align: center; }
</style>
<style>



#loginBox {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-top: 50px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* 📱 Mobile responsive */


  #loginBox {
    margin-top: 20px;
    padding: 15px;
  }

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  background: #334155;
  color: #fff;
}

  h2 {
    font-size: 20px;
  }
}

button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg,#3b82f6,#6366f1);
  color: white;
  cursor: pointer;
}


#statsBox {
  display:none;
  background:#020617;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginBox">
  <h2>🔐 Login Panel</h2>

  <input id="username" placeholder="Username">
  <div style="position:relative;">
  <input id="password" type="password" placeholder="Password">
  <span onclick="togglePassword()" id="eyeBtn"
        style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;">
        👁
  </span>
</div>

  <p id="loginError">❌ Username বা Password ভুল</p>

<button onclick="login()">Login</button>

</div>

<!-- MAIN PANEL -->

<div id="mainPanel" style="display:none;">

<h2>🔐 Ads Control Panel</h2>

<p id="roleInfo"></p>

<input type="password" id="token" placeholder="GitHub Token">

<h3>Add / Edit Ad</h3>
<input id="id" placeholder="ID">
<input id="title" placeholder="Title">
<input id="image" placeholder="Image URL">
<input id="link" placeholder="Link">
<input id="category" placeholder="Category">
<button onclick="saveAd()">Save Ad</button>

<h3>Ads List</h3>
<div id="adsList"></div>

<button onclick="saveAll()">💾 Save to GitHub</button> <button onclick="toggleStats()">📊 Analytics</button>

<div id="statsBox"></div>

</div>

<script>
// USERS
const users = [
 {user:"admin", pass:"7931", role:"admin"},
 {user:"client1", pass:"1111", role:"client"},
 {user:"client2", pass:"2222", role:"client"},
 {user:"client3", pass:"3333", role:"client"},
 {user:"client4", pass:"4444", role:"client"},
 {user:"client5", pass:"5555", role:"client"}
];

let currentUser;
const repo = "aveestb/my-ads-system";

let ads = [];
let stats = {ads:{}};
let shaAds="", shaStats="";

// LOGIN
function login(){
 let u = username.value.trim();
 let p = password.value.trim();
 let err = loginError;

 let user = users.find(x=>x.user===u && x.pass===p);

 if(!user){
  err.style.display="block";
  return;
 }

 currentUser = user;

 loginBox.style.display="none";
 mainPanel.style.display="block";

 roleInfo.innerHTML = `Logged in as <b>${user.user}</b> (${user.role})`;

 err.style.display="none";

 loadAll(); // login এর পর load
}


function togglePassword() {
    let pass = document.getElementById("password");
    let eye = document.getElementById("eyeBtn");

    if (pass.type === "password") {
        pass.type = "text";
        eye.innerHTML = "🙈";
    } else {
        pass.type = "password";
        eye.innerHTML = "👁";
    }
}


  
// LOAD DATA
async function loadAll(){
 let a = await fetch(`https://api.github.com/repos/${repo}/contents/ads.json`).then(r=>r.json());
 let s = await fetch(`https://api.github.com/repos/${repo}/contents/stats.json`).then(r=>r.json());

 shaAds=a.sha; shaStats=s.sha;

 ads = JSON.parse(atob(a.content));
 stats = JSON.parse(atob(s.content));

 renderAds();
 renderStats();
}

// ADS UI
function renderAds(){
 let html="";
 ads.forEach(ad=>{
  html+=`
  <div class="ad">
   <b>${ad.title}</b><br>
   <img src="${ad.image}" width="100%">
   <button onclick="editAd(${ad.id})">Edit</button>
   ${currentUser.role==="admin" ? `<button onclick="deleteAd(${ad.id})">Delete</button>`:""}
  </div>`;
 });
 adsList.innerHTML=html;
}

// STATS UI
function renderStats(){
 let html="";
 for(let id in stats.ads){
  let s=stats.ads[id];
  html+=`<p>Ad ${id}: ${s.views||0} views / ${s.clicks||0} clicks</p>`;
 }
 statsBox.innerHTML=html;
}

// TOGGLE
function toggleStats(){
 statsBox.style.display = statsBox.style.display==="none"?"block":"none";
}

// EDIT
function editAd(id){
 let ad=ads.find(a=>a.id==id);
 id.value=ad.id;
 title.value=ad.title;
 image.value=ad.image;
 link.value=ad.link;
 category.value=ad.category;
}

// SAVE AD
function saveAd(){
 let idVal = id.value;

 let ad={
  id:Number(idVal||Date.now()),
  title:title.value,
  image:image.value,
  link:link.value,
  category:category.value
 };

 let i=ads.findIndex(a=>a.id==ad.id);

 if(i>-1) ads[i]=ad;
 else{
  ads.push(ad);
  stats.ads[ad.id]={views:0,clicks:0};
 }

 renderAds();
}

// DELETE
function deleteAd(idVal){
 ads=ads.filter(a=>a.id!=idVal);
 delete stats.ads[idVal];
 renderAds();
}

// SAVE GITHUB
async function saveAll(){
 let t=token.value;

 await update("ads.json",ads,shaAds,t);
 await update("stats.json",stats,shaStats,t);

 alert("Saved!");
}

async function update(path,data,sha,t){
 await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
  method:"PUT",
  headers:{
   "Authorization":"token "+t,
   "Content-Type":"application/json"
  },
  body:JSON.stringify({
   message:"update",
   content:btoa(JSON.stringify(data,null,2)),
   sha:sha
  })
 });
}
</script>

</body>
</html>
