<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Login Pro</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #01030a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}

.phone {
    width: 320px;
    height: 600px;
    border-radius: 40px;
    background: #020617;
    padding: 15px;
    position: relative;
    overflow: hidden;
}

.phone::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 40px;
    background: linear-gradient(120deg, #0ff, #00f, #0ff);
    animation: borderMove 4s linear infinite;
    z-index: 0;
}

.phone::after {
    content: "";
    position: absolute;
    inset: 4px;
    background: #020617;
    border-radius: 36px;
    z-index: 1;
}

@keyframes borderMove {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.screen {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    border-radius: 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* Login Button */
#loginBtn {
    padding: 12px 30px;
    border: 2px solid #0ff;
    color: #0ff;
    background: transparent;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 0 10px #0ff;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 10px #0ff; }
    50% { box-shadow: 0 0 25px #0ff; }
    100% { box-shadow: 0 0 10px #0ff; }
}

/* Login Box */
.login-box {
    margin-top: 20px;
    width: 80%;
    opacity: 0;
    transform: translateY(50px) scale(0.8);
    pointer-events: none;
    transition: 0.5s;
}

.login-box.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
}

.login-box h2 {
    color: #0ff;
    text-align: center;
    text-shadow: 0 0 10px #0ff;
}

.glow-input {
    width: 100%;
    margin: 12px 0;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #0ff;
    background: transparent;
    color: #0ff;
    outline: none;
}

.glow-input:focus {
    box-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
}

.glow-input.typing {
    box-shadow: 0 0 15px #0ff, 0 0 30px #0ff, inset 0 0 10px #0ff;
}

/* Submit Button */
.submit-btn {
    width: 100%;
    padding: 12px;
    border-radius: 20px;
    border: none;
    background: #0ff;
    color: #000;
    font-weight: bold;
    cursor: pointer;
}

.submit-btn:hover {
    box-shadow: 0 0 20px #0ff, 0 0 50px #0ff;
}

/* Hidden main panel */
#mainPanel {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #020617;
    color: white;
    padding: 20px;
    overflow-y: auto;
}
</style>

</head>

<body>

<!-- LOGIN UI -->

<div class="phone" id="loginUI">
    <div class="screen">

```
    <button id="loginBtn">⚡ Login</button>

    <div class="login-box" id="loginBox">
        <h2>Access System</h2>

        <input id="username" type="text" placeholder="Username" class="glow-input">
        <input id="password" type="password" placeholder="Password" class="glow-input">

        <p id="errorMsg" style="color:#ff6b6b; text-align:center; display:none;">
            ❌ Username বা Password ভুল
        </p>

        <button class="submit-btn" onclick="login()">ENTER</button>
    </div>

</div>
```

</div>

<!-- MAIN PANEL -->

<div id="mainPanel">
    <h2>🔐 Ads Control Panel</h2>
    <p id="roleInfo"></p>

</div>

<script>
// USERS
const users = [
 {user:"admin", pass:"7931", role:"admin"},
 {user:"client1", pass:"1111", role:"client"},
 {user:"client2", pass:"2222", role:"client"},
 {user:"client3", pass:"3333", role:"client"},
 {user:"client4", pass:"4444", role:"client"},
 {user:"client5", pass:"5555", role:"client"}
];

const btn = document.getElementById("loginBtn");
const box = document.getElementById("loginBox");

// open animation
btn.onclick = () => {
    box.classList.toggle("active");
};

// typing glow
document.querySelectorAll(".glow-input").forEach(input=>{
    input.addEventListener("input", ()=>{
        input.classList.toggle("typing", input.value.length>0);
    });
});

// LOGIN
function login(){
    let u = document.getElementById("username").value.trim();
    let p = document.getElementById("password").value.trim();
    let err = document.getElementById("errorMsg");

    let user = users.find(x=>x.user===u && x.pass===p);

    if(!user){
        err.style.display="block";
        return;
    }

    err.style.display="none";

    document.getElementById("loginUI").style.display="none";
    document.getElementById("mainPanel").style.display="block";

    document.getElementById("roleInfo").innerHTML =
     `Logged in as <b>${user.user}</b> (${user.role})`;

    localStorage.setItem("adsUser", JSON.stringify(user));
}

// AUTO LOGIN
window.onload = function(){
    let saved = localStorage.getItem("adsUser");
    if(saved){
        let user = JSON.parse(saved);

        document.getElementById("loginUI").style.display="none";
        document.getElementById("mainPanel").style.display="block";

        document.getElementById("roleInfo").innerHTML =
         `Logged in as <b>${user.user}</b> (${user.role})`;
    }
};

// LOGOUT
function logout(){
    localStorage.removeItem("adsUser");
    location.reload();
}
</script>

</body>
</html>
