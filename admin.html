<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Ads Admin Panel</title>

<style>body {
  font-family: 'Segoe UI', Arial;
  background: #0f172a;
  color: #fff;
  max-width: 700px;
  margin: auto;
  padding: 15px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

#loginBox {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-top: 50px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
#loginError {
  background: rgba(248,113,113,0.1);
  padding: 8px;
  border-radius: 6px;
  margin-top: 5px;
  font-size: 14px;
}
  
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #334155;
  color: #fff;
}

button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

.ad {
  background: #1e293b;
  border-radius: 12px;
  padding: 10px;
  margin: 10px 0;
}

.ad img {
  border-radius: 10px;
}

#statsBox {
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

</style>

</head>
<body>


<div id="loginBox">
  <h2>🔐 Login Panel</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <p id="loginError" style="color:#f87171;text-align:center;display:none;">
    ❌ Username বা Password ভুল
  </p>

  <button onclick="login()">Login</button>
</div>

<div id="mainPanel" style="display:none;">
  
<h2>🔐 Ads Control Panel</h2>

<script>
// 🔐 USERS SYSTEM
const users = [
    {user:"admin", pass:"7931", role:"admin"},
    {user:"client1", pass:"1111", role:"Ami"},
    {user:"client2", pass:"2222", role:"client"},
    {user:"client3", pass:"3333", role:"client"},
    {user:"client4", pass:"4444", role:"client"},
    {user:"client5", pass:"5555", role:"client"}
];

let currentUser;

function login() {
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();
    let errorBox = document.getElementById("loginError");

    let user = users.find(u => u.user === username && u.pass === password);

    if (!user) {
        errorBox.style.display = "block";
        return;
    }

    // success
    currentUser = user;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainPanel").style.display = "block";

    document.getElementById("roleInfo").innerHTML =
        "Logged in as: <b>" + user.user + "</b> (" + user.role + ")";

    errorBox.style.display = "nonclient
</script>

<p id="roleInfo"></p>

<input type="password" id="token" placeholder="GitHub Token">

<h3>Add / Edit Ad</h3>
<input id="id" placeholder="ID (edit হলে)">
<input id="title" placeholder="Title">
<input id="image" placeholder="Image URL">
<input id="link" placeholder="Link">
<input id="category" placeholder="Category">
<button onclick="saveAd()">Save Ad</button>

<h3>Ads List</h3>
<div id="adsList"></div>


<button onclick="saveAll()">💾 Save to GitHub</button>

<button onclick="toggleStats()">📊 Analytics</button>
<h3>📊 Analytics</h3>
<div id="statsBox" style="display:none;"></div>

<script>
const repo = "aveestb/my-ads-system";

let ads = [];
let stats = { ads:{}, geo:{}, device:{} };
let shaAds = "", shaStats = "";

// role show
document.getElementById("roleInfo").innerHTML =
"Logged in as: <b>" + currentUser.user + "</b> (" + currentUser.role + ")";

// load data
async function loadAll() {
    let adRes = await fetch(`https://api.github.com/repos/${repo}/contents/ads.json`);
    let statRes = await fetch(`https://api.github.com/repos/${repo}/contents/stats.json`);

    let adData = await adRes.json();
    let statData = await statRes.json();

    shaAds = adData.sha;
    shaStats = statData.sha;

    ads = JSON.parse(atob(adData.content));
    stats = JSON.parse(atob(statData.content));

    renderAds();
    renderStats();
}

// render ads
function renderAds() {
    let html = "";
    ads.forEach(ad => {
        html += `
        <div class="ad">
            <b>${ad.title}</b> (${ad.category})<br>
            <img src="${ad.image}" width="100%"><br>
            <button onclick="editAd(${ad.id})">Edit</button>
            ${currentUser.role === "admin" ? `<button onclick="deleteAd(${ad.id})">Delete</button>` : ""}
        </div>`;
    });
    document.getElementById("adsList").innerHTML = html;
}

// render analytics (NEW STRUCTURE)
function renderStats() {
    let html = "";
    for (let id in stats.ads) {
        let s = stats.ads[id];
        html += `<p>Ad ${id} → Views: ${s.views || 0}, Clicks: ${s.clicks || 0}, CTR: ${s.ctr || 0}%</p>`;
    }
    document.getElementById("statsBox").innerHTML = html;
}

// edit (FIXED)
function editAd(id) {
    let ad = ads.find(a => a.id == id);

    document.getElementById("id").value = ad.id;
    document.getElementById("title").value = ad.title;
    document.getElementById("image").value = ad.image;
    document.getElementById("link").value = ad.link;
    document.getElementById("category").value = ad.category;
}

// save ad (WITH stats auto create)
function saveAd() {
    let id = document.getElementById("id").value;

    let ad = {
        id: Number(id || Date.now()),
        title: document.getElementById("title").value,
        image: document.getElementById("image").value,
        link: document.getElementById("link").value,
        category: document.getElementById("category").value
    };

    let index = ads.findIndex(a => a.id == ad.id);

    if (index > -1) ads[index] = ad;
    else {
        ads.push(ad);

        // 📊 create stats automatically
        if (!stats.ads[ad.id]) {
            stats.ads[ad.id] = { views: 0, clicks: 0, ctr: 0 };
        }
    }

    renderAds();
}

// delete (admin only + stats remove)
function deleteAd(id) {
    ads = ads.filter(a => a.id != id);

    delete stats.ads[id];

    renderAds();
    renderStats();
}

// save to github
async function saveAll() {
    let token = document.getElementById("token").value;

    await updateFile("ads.json", ads, shaAds, token);
    await updateFile("stats.json", stats, shaStats, token);

    alert("Saved to GitHub!");
}

// update file (FIXED headers)
async function updateFile(path, content, sha, token) {
    await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
        method: "PUT",
        headers: {
            "Authorization": "token " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "update " + path,
            content: btoa(JSON.stringify(content, null, 2)),
            sha: sha
        })
    });
}

loadAll();
</script>

</body>
</html>
